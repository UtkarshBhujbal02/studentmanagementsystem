<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Student Management System</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h3 style="font-weight: 600;">Student Management System</h3>
        <button id="logout-btn" class="btn-ghost">Logout</button>
    </header>

    <div class="main-content">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h2>Students</h2>
                <p style="color: #666; font-size: 14px; margin-top: 4px;">Manage all student records</p>
            </div>
            <div class="flex gap-4">
                <input type="text" id="search-input" placeholder="Search students..." style="width: 250px;">
                <button id="open-add-modal-btn" class="btn-primary">+ Add Student</button>
            </div>
        </div>

        <div class="card" style="padding: 0; overflow: hidden;">
            <table class="table">
                <thead>
                    <tr>
                        <th>Id</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Age</th>
                        <th>Course</th>
                        <th>Created Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="students-table-body">
                    <!-- Data rendered here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="student-modal" class="modal-overlay">
        <div class="modal">
            <h2 id="modal-title" class="mb-4">Add New Student</h2>
            <form id="student-form">
                <input type="hidden" id="student-id">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="name" required>
                    <span class="error-msg"></span>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                    <span class="error-msg"></span>
                </div>
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" id="age" required>
                    <span class="error-msg"></span>
                </div>
                <div class="form-group">
                    <label>Course</label>
                    <input type="text" id="course" required>
                    <span class="error-msg"></span>
                </div>
                <div class="text-right mt-4">
                    <button type="button" class="btn-ghost close-modal-btn" data-target="student-modal">Cancel</button>
                    <button type="submit" class="btn-primary" id="save-btn">Save Student</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Modal -->
    <div id="delete-modal" class="modal-overlay">
        <div class="modal" style="width: 400px">
            <h2 class="mb-4">Delete Student?</h2>
            <p id="delete-text" class="mb-4">Are you sure you want to delete this student?</p>
            <input type="hidden" id="delete-student-id">
            <div class="text-right">
                <button type="button" class="btn-ghost close-modal-btn" data-target="delete-modal">Cancel</button>
                <button type="button" class="btn-danger" id="confirm-delete-btn">Delete</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/students.js"></script>
</body>
</html>
